<!DOCTYPE html>
<html>

<head>

    <title>Edit Goal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow border-0">

        <div class="card-body p-4">

            <h2 class="mb-4">
                Edit Goal
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Goal Title
                    </label>

                    <input type="text"
                           name="title"
                           class="form-control"
                           value="{{ goal.title }}"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea name="description"
                              class="form-control"
                              required>{{ goal.description }}</textarea>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Thrust Area
                    </label>

                    <input type="text"
                           name="thrust_area"
                           class="form-control"
                           value="{{ goal.thrust_area }}"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-success">

                    Save Changes

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
