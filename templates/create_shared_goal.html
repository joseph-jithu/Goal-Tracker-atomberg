<!DOCTYPE html>
<html>

<head>

    <title>Create Shared Goal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow border-0">

        <div class="card-body p-4">

            <h2 class="mb-4">
                Create Shared Goal
            </h2>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Goal Title
                    </label>

                    <input type="text"
                           name="title"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea name="description"
                              class="form-control"
                              required></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Thrust Area
                    </label>

                    <input type="text"
                           name="thrust_area"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        UOM
                    </label>

                    <select name="uom"
                            class="form-control">

                        <option value="Numeric">Numeric</option>
                        <option value="%">%</option>
                        <option value="Zero">Zero</option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Target Value
                    </label>

                    <input type="number"
                           step="0.01"
                           name="target_value"
                           class="form-control"
                           required>

                </div>

                <div class="mb-4">

                    <label class="form-label">
                        Weightage
                    </label>

                    <input type="number"
                           name="weightage"
                           class="form-control"
                           required>

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Create Shared Goal

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
