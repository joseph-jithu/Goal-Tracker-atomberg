<!DOCTYPE html>
<html>

<head>

    <title>Manager Check-in</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h3 class="mb-4">
                Manager Check-in
            </h3>

            <div class="mb-3">

                <p><strong>Goal:</strong> {{ goal.title }}</p>
                <p><strong>Target:</strong> {{ goal.target_value }}</p>
                <p><strong>Actual:</strong> {{ goal.actual_value }}</p>
                <p><strong>Status:</strong> {{ goal.status }}</p>

            </div>

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Manager Comment
                    </label>

                    <textarea name="manager_comment"
                              class="form-control"
                              rows="4"
                              required></textarea>

                </div>

                <button class="btn btn-success">

                    Save Check-in

                </button>

            </form>

        </div>

    </div>

</div>

</body>

</html>
