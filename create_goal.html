<!DOCTYPE html>
<html>

<head>

    <title>Create Goal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-body">

            <h2 class="mb-4">
                Create Goal
            </h2>

            <!-- FLASH MESSAGES -->

            {% with messages = get_flashed_messages(with_categories=true) %}

                {% if messages %}

                    {% for category, message in messages %}

                        <div class="alert alert-{{ category }}">
                            {{ message }}
                        </div>

                    {% endfor %}

                {% endif %}

            {% endwith %}

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Goal Title
                    </label>

                    <input type="text"
                           name="title"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Description
                    </label>

                    <textarea name="description"
                              class="form-control"
                              rows="3"
                              required></textarea>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Thrust Area
                    </label>

                    <select name="thrust_area"
                            class="form-control"
                            required>

                        <option value="">
                            Select Thrust Area
                        </option>

                        <option value="Revenue Growth">
                            Revenue Growth
                        </option>

                        <option value="Customer Satisfaction">
                            Customer Satisfaction
                        </option>

                        <option value="Operational Excellence">
                            Operational Excellence
                        </option>

                        <option value="Innovation">
                            Innovation
                        </option>

                        <option value="Quality Improvement">
                            Quality Improvement
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Unit of Measurement (UOM)
                    </label>

                    <select name="uom"
                            class="form-control"
                            required>

                        <option value="Numeric">
                            Numeric
                        </option>

                        <option value="%">
                            Percentage (%)
                        </option>

                        <option value="Max">
                            Max
                        </option>

                        <option value="Zero">
                            Zero Based
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Target Value
                    </label>

                    <input type="number"
                           step="0.01"
                           name="target_value"
                           class="form-control"
                           required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Weightage (%)
                    </label>

                    <input type="number"
                           name="weightage"
                           class="form-control"
                           required>

                    <small class="text-muted">
                        Minimum 10% per goal. Total across all goals must equal 100%.
                    </small>

                </div>

                <button type="submit"
                        class="btn btn-primary">

                    Save Goal

                </button>

                <a href="/employee/dashboard"
                   class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
